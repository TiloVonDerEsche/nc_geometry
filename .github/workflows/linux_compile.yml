name: Linux build generate_track_list.bin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: make
      run: make -C ./src/flex
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-binary
        path: ./generate_track_list.bin
